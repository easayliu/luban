# luban CI —— 构建 Linux 二进制 + 构建并推送 Docker 镜像
# 触发：打 tag（v*）、默认分支、手动运行（web）

stages:
  - build
  - docker

variables:
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"

# ---------- 构建 Linux 二进制 ----------
build:binary:
  stage: build
  image: rust:1-bookworm
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cargo/
      - target/
      - admin-ui/node_modules/
  before_script:
    # rust:1-bookworm 自带 gcc/perl；补装 cmake(aws-lc-rs 需要) 与 node/pnpm
    - apt-get update && apt-get install -y --no-install-recommends cmake nodejs npm && rm -rf /var/lib/apt/lists/*
    - npm install -g pnpm@10
  script:
    - cd admin-ui && pnpm install --frozen-lockfile && pnpm build && cd ..
    - cargo build --release
    - mkdir -p dist && cp target/release/luban dist/luban
  artifacts:
    name: "luban-${CI_COMMIT_REF_SLUG}"
    paths:
      - dist/luban
    expire_in: 1 week

# ---------- 构建并推送 Docker 镜像到 GitLab Container Registry ----------
docker:image:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  rules:
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "web"'
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    IMAGE_TAG: "${CI_COMMIT_TAG:-latest}"
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$IMAGE_TAG" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$IMAGE_TAG"
    - docker push "$CI_REGISTRY_IMAGE:latest"
