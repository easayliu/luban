services:
  luban:
    # 国内镜像可用：ghcr.nju.edu.cn/${IMAGE_OWNER:-easayliu}/luban:${IMAGE_TAG:-latest}
    image: ghcr.io/${IMAGE_OWNER:-easayliu}/luban:${IMAGE_TAG:-latest}
    container_name: luban
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${PORT:-4600}:4600"
    environment:
      # 接入 Key：留空则改由网页「接入设置」管理
      - LUBAN_API_KEY=${LUBAN_API_KEY:-}
    volumes:
      # 凭证库(SQLite)持久化到宿主机 ./config（容器内 LUBAN_HOME=/app/config）
      - ./config/:/app/config/
    restart: unless-stopped
